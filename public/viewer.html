<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Morphara 3D Viewer</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111}
canvas{display:block}
</style>
</head>
<body>
<canvas id="app"></canvas>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/exporters/GLTFExporter.js"></script>

<script>
  console.log("THREE loaded:", typeof THREE)
  console.log("Exporter:", typeof THREE.GLTFExporter, typeof GLTFExporter)
</script>

<script>
const canvas = document.getElementById("app")
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true })
renderer.setSize(innerWidth, innerHeight)
renderer.setPixelRatio(devicePixelRatio)

const scene = new THREE.Scene()
scene.background = new THREE.Color(0x111111)

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 100)
camera.position.set(0,2.8,6)
camera.lookAt(0,1,0)

scene.add(new THREE.HemisphereLight(0xffffff,0x333333,1.1))
const sun = new THREE.DirectionalLight(0xffffff,1.2)
sun.position.set(4,10,6)
scene.add(sun)

const ground = new THREE.Mesh(
 new THREE.PlaneGeometry(30,30),
 new THREE.MeshStandardMaterial({ color:0x2a2a2a })
)
ground.rotation.x = -Math.PI/2
ground.position.y = 0
scene.add(ground)

let width=2.2, height=0.9, depth=1.4, armHeight=0.6
let color = new THREE.Color("#c5705d")

let seatMesh=null, backMesh=null, leftArm=null, rightArm=null
let visible={ seat:true, back:true, arm:true }

let mode="move"
let isDragging=false
let lastX=0,lastY=0

function roundedBox(w,h,d,r){
 const g = new THREE.BoxGeometry(w,h,d,6,6,6)
 const pos = g.attributes.position
 const v = new THREE.Vector3()
 for(let i=0;i<pos.count;i++){
  v.fromBufferAttribute(pos,i)
  v.x += Math.sign(v.x)*r
  v.y += Math.sign(v.y)*r
  v.z += Math.sign(v.z)*r
  pos.setXYZ(i,v.x,v.y,v.z)
 }
 return g
}

function mat(){
 return new THREE.MeshStandardMaterial({ color, roughness:0.55, metalness:0.08 })
}

function exportGLB(group){
  const gltf = {
    asset: { version: "2.0", generator: "MorpharaMiniExporter" },
    scenes: [{ nodes: [] }],
    nodes: [],
    meshes: [],
    buffers: [{ byteLength: 0 }],
    bufferViews: [],
    accessors: []
  }

  let positions = []
  let normals = []
  let indices = []
  let meshIndex = 0

  group.traverse(obj=>{
    if(!obj.isMesh) return

    const geo = obj.geometry.clone()
    geo.applyMatrix4(obj.matrixWorld)

    const pos = geo.attributes.position.array
    const nor = geo.attributes.normal.array

    const indexOffset = positions.length / 3

    for(let i=0;i<pos.length;i++) positions.push(pos[i])
    for(let i=0;i<nor.length;i++) normals.push(nor[i])

    if(geo.index){
      const idx = geo.index.array
      for(let i=0;i<idx.length;i++) indices.push(idx[i] + indexOffset)
    }else{
      for(let i=0;i<pos.length/3;i++) indices.push(indexOffset + i)
    }

    const nodeIndex = gltf.nodes.length
    const meshIdx = gltf.meshes.length

    gltf.nodes.push({ mesh: meshIdx })
    gltf.scenes[0].nodes.push(nodeIndex)

    gltf.meshes.push({
      primitives: [{
        attributes: { POSITION: 0, NORMAL: 1 },
        indices: 2
      }]
    })

    meshIndex++
  })

  const posBytes = new Float32Array(positions).buffer
  const norBytes = new Float32Array(normals).buffer
  const idxBytes = new Uint32Array(indices).buffer

  let offset = 0

  gltf.bufferViews.push({ buffer: 0, byteOffset: offset, byteLength: posBytes.byteLength })
  gltf.accessors.push({
    bufferView: 0,
    componentType: 5126,
    count: positions.length/3,
    type: "VEC3"
  })
  offset += posBytes.byteLength

  gltf.bufferViews.push({ buffer: 0, byteOffset: offset, byteLength: norBytes.byteLength })
  gltf.accessors.push({
    bufferView: 1,
    componentType: 5126,
    count: normals.length/3,
    type: "VEC3"
  })
  offset += norBytes.byteLength

  gltf.bufferViews.push({ buffer: 0, byteOffset: offset, byteLength: idxBytes.byteLength })
  gltf.accessors.push({
    bufferView: 2,
    componentType: 5125,
    count: indices.length,
    type: "SCALAR"
  })
  offset += idxBytes.byteLength

  const json = JSON.stringify(gltf)
  const jsonBytes = new TextEncoder().encode(json)

  const total = 12 + jsonBytes.byteLength + posBytes.byteLength + norBytes.byteLength + idxBytes.byteLength
  const buffer = new ArrayBuffer(total)
  const view = new DataView(buffer)

  let ptr = 0
  view.setUint32(ptr, 0x46546C67, true); ptr+=4
  view.setUint32(ptr, 2, true); ptr+=4
  view.setUint32(ptr, total, true); ptr+=4

  view.setUint32(ptr, jsonBytes.byteLength, true); ptr+=4
  view.setUint32(ptr, 0x4E4F534A, true); ptr+=4
  new Uint8Array(buffer, ptr, jsonBytes.byteLength).set(jsonBytes)
  ptr += jsonBytes.byteLength

  view.setUint32(ptr, posBytes.byteLength + norBytes.byteLength + idxBytes.byteLength, true); ptr+=4
  view.setUint32(ptr, 0x004E4942, true); ptr+=4
  new Uint8Array(buffer, ptr, posBytes.byteLength).set(new Uint8Array(posBytes)); ptr+=posBytes.byteLength
  new Uint8Array(buffer, ptr, norBytes.byteLength).set(new Uint8Array(norBytes)); ptr+=norBytes.byteLength
  new Uint8Array(buffer, ptr, idxBytes.byteLength).set(new Uint8Array(idxBytes)); ptr+=idxBytes.byteLength

  return buffer
}


function rebuildSofa(){
 [seatMesh,backMesh,leftArm,rightArm].forEach(m=>m && scene.remove(m))

 const seatH = height*0.35
 const backH = height*0.55
 const armW = width*0.12

 seatMesh = new THREE.Mesh(
  roundedBox(width*0.9, seatH, depth*0.9, 0.05),
  mat()
 )
 seatMesh.position.set(0, seatH/2, 0)
 seatMesh.visible = visible.seat
 scene.add(seatMesh)

 backMesh = new THREE.Mesh(
  roundedBox(width*0.9, backH, depth*0.18, 0.05),
  mat()
 )
 backMesh.position.set(0, seatH + backH/2 - 0.05, -depth/2 + depth*0.09)
 backMesh.rotation.x = -0.15
 backMesh.visible = visible.back
 scene.add(backMesh)

 leftArm = new THREE.Mesh(
  roundedBox(armW, armHeight, depth*0.9, 0.05),
  mat()
 )
 leftArm.position.set(-width/2 + armW/2, armHeight/2, 0)
 leftArm.visible = visible.arm
 scene.add(leftArm)

 rightArm = leftArm.clone()
 rightArm.position.x = width/2 - armW/2
 rightArm.visible = visible.arm
 scene.add(rightArm)
}

rebuildSofa()

canvas.addEventListener("mousedown",e=>{
 isDragging=true
 lastX=e.clientX
 lastY=e.clientY
})

window.addEventListener("mouseup",()=> isDragging=false)

window.addEventListener("mousemove",e=>{
 if(!isDragging) return

 const dx = e.clientX-lastX
 const dy = e.clientY-lastY
 lastX=e.clientX
 lastY=e.clientY

 if(mode==="move"){
  camera.position.x -= dx*0.01
  camera.position.y += dy*0.01
  camera.lookAt(0,1,0)
 }

 if(mode==="resize"){
  width += dx*0.002
  depth += dy*0.002
  rebuildSofa()
 }

 if(mode==="sculpt" && seatMesh){
  seatMesh.scale.y += dy*0.002
 }
})

window.addEventListener("message",e=>{
 const {type,value}=e.data||{}
 console.log("msg:",type,value)

 if(type==="mode") mode=value

 if(type==="zoom"){
  camera.position.z -= value * 0.4
  camera.position.z = Math.max(4, Math.min(25, camera.position.z))
 }

 if(type==="color"){
  color = new THREE.Color(value)
  rebuildSofa()
 }

 if(type==="rebuild"){
  width=value.w/100
  height=value.h/100
  depth=value.d/100
  rebuildSofa()
 }

if(type==="parts"){
  if(value==="seat") visible.seat=!visible.seat
  if(value==="back") visible.back=!visible.back
  if(value==="arm") visible.arm=!visible.arm
  rebuildSofa()
}

 if(type==="export"){
  const exportGroup = new THREE.Group()
  exportGroup.add(seat.clone())
  exportGroup.add(back.clone())
  exportGroup.add(leftArm.clone())
  exportGroup.add(rightArm.clone())
  exportGroup.add(base.clone())

  const glbBuffer = exportGLB(exportGroup)

  const blob = new Blob([glbBuffer], { type: "model/gltf-binary" })
  const url = URL.createObjectURL(blob)

  const a = document.createElement("a")
  a.href = url
  a.download = "morphara_sofa.glb"
  document.body.appendChild(a)
  a.click()

  setTimeout(()=>{
    URL.revokeObjectURL(url)
    document.body.removeChild(a)
  },100)
}

 if(type==="save"){
  const data={width,height,depth,color:color.getHexString()}
  localStorage.setItem("morphara_design",JSON.stringify(data))
  alert("Design saved!")
 }

  if(type==="copilot"){
    if(value.includes("bigger")) width+=0.3
    if(value.includes("smaller")) width-=0.3
    if(value.includes("taller")) height+=0.2
    if(value.includes("shorter")) height-=0.2
    if(value.includes("deeper")) depth+=0.2
    if(value.includes("red")) color=new THREE.Color("#b24b4b")
    if(value.includes("blue")) color=new THREE.Color("#4b6bb2")
    rebuildSofa()
 }

})

function animate(){
 requestAnimationFrame(animate)
 renderer.render(scene,camera)
}
animate()

addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight
 camera.updateProjectionMatrix()
 renderer.setSize(innerWidth,innerHeight)
})
</script>
</body>
</html>
